  # ----------------------------------------
  # 3. Keep-Alive Cron Job (every 10 minutes)
  #    Pings the backend so Render free-tier
  #    never spins the server down.
  # ----------------------------------------
  - type: cron
    name: trustlens-keep-alive
    env: node
    # Cron schedule: every 10 minutes, 24/7
    schedule: "*/10 * * * *"
    # Simple one-liner – no extra files needed
    buildCommand: "true"
    startCommand: >
      node -e "
        const https = require('https');
        const url = process.env.BACKEND_URL || 'https://trustlens-api.onrender.com/health';
        https.get(url, (res) => {
          console.log('[keep-alive]', new Date().toISOString(), 'status:', res.statusCode);
        }).on('error', (e) => {
          console.error('[keep-alive] Error:', e.message);
          process.exit(1);
        });
      "
    envVars:
      # Replace the default value with your actual Render backend URL
      - key: BACKEND_URL
        value: https://trustlens-api.onrender.com/health
