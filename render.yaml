services:
  # ----------------------------------------
  # 1. Backend Web Service (Node.js/Express)
  # ----------------------------------------
  - type: web
    name: trustlens-api
    env: node
    rootDir: server # Run all commands inside the /server directory
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Don't forget to add your MongoDB URI in the Render dashboard!
      - key: MONGO_URI
        sync: false 
      # Add any other required environment variables here (e.g., JWT_SECRET)
      - key: JWT_SECRET
        sync: false

  # ----------------------------------------
  # 2. Frontend Static Site (React/Vite)
  # ----------------------------------------
  - type: web
    name: trustlens-frontend
    env: static
    rootDir: client # Run all commands inside the /client directory
    buildCommand: npm install && npm run build
    staticPublishPath: dist # Vite builds to the "dist" folder
    envVars:
      - key: NODE_ENV
        value: production
      # This links the frontend to the backend service we created above
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: trustlens-api
          envVarKey: RENDER_EXTERNAL_URL
    # Required for React Router (Single Page Application)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
